version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@booking.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8085:80"
    depends_on:
      - postgres

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - business-service
      - client-service

  user-service:
    build: ./user-service
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  business-service:
    build: ./business-service
    ports:
      - "8082:8080"
    depends_on:
      - postgres

  client-service:
    build: ./client-service
    ports:
      - "8083:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: